[pre-commit]
parallel = true

[pre-commit.commands.rust-fmt]
glob = ["*.rs"]
run = "rustfmt --check {staged_files}"

[pre-commit.commands.biome-check]
run = "pnpm exec biome check --error-on-warnings --no-errors-on-unmatched {staged_files}"

[pre-commit.commands.cSpell]
run = "pnpm exec cspell lint --no-progress --no-must-find-files {staged_files}"
